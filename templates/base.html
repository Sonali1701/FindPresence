<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}FindPresence{% endblock %}</title>
{% block head %}{% endblock %}
<style>
  :root {
    --bg:      #0b1120;
    --surface: #111827;
    --panel:   #1a2233;
    --border:  #253047;
    --border2: #2e3f5c;
    --text:    #e2e8f0;
    --muted:   #7f93b3;
    --dim:     #4a5e7a;
    --accent:  #38bdf8;
    --good:    #22c55e;
    --warn:    #f59e0b;
    --bad:     #f43f5e;
    --bad-bg:  rgba(244,63,94,.08);
    --warn-bg: rgba(245,158,11,.08);
    --good-bg: rgba(34,197,94,.08);
  }
  *, *::before, *::after { box-sizing: border-box; }

  html { scrollbar-color: var(--border2) var(--bg); scrollbar-width: thin; }
  body { font-family: "Inter", system-ui, -apple-system, Segoe UI, sans-serif;
         margin: 0; background: var(--bg); color: var(--text);
         font-size: 14px; line-height: 1.5; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -.01em; color: var(--text); }
  header .brand { display: flex; align-items: center; gap: 10px; }
  header .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  header .meta { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header a { color: var(--accent); text-decoration: none; font-size: 12px; }
  header a:hover { text-decoration: underline; }

  /* ── Layout ── */
  main { padding: 24px 28px; max-width: 1280px; margin: 0 auto; }

  /* ── Metric cards ── */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border2); border-radius: 3px 0 0 3px; }
  .card.good::before { background: var(--good); }
  .card.warn::before { background: var(--warn); }
  .card.bad::before  { background: var(--bad); }
  .card:hover { border-color: var(--border2); }
  .card .label  { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; }
  .card .value  { font-size: 30px; font-weight: 700; margin: 6px 0 4px; letter-spacing: -.02em; }
  .card.good .value { color: var(--good); }
  .card.warn .value { color: var(--warn); }
  .card.bad  .value { color: var(--bad); }
  .card .sublabel { color: var(--muted); font-size: 11px; }

  /* ── Panels ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .panel-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin: 0 0 4px;
  }
  .panel-subtitle { font-size: 12px; color: var(--dim); margin: 0 0 16px; }
  .panel h2 { font-size: 12px; font-weight: 700; text-transform: uppercase;
              letter-spacing: .07em; color: var(--muted); margin: 0 0 16px; }
  .panel-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .panel-head-left { flex: 1; }
  .panel-controls {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .panel-controls input[type=search] {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 6px; padding: 6px 10px;
    font-size: 12px; min-width: 200px; outline: none;
    transition: border-color .15s;
  }
  .panel-controls input[type=search]:focus { border-color: var(--accent); }
  .panel-controls .check { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; }
  .panel-controls .check input { accent-color: var(--accent); }
  .panel-controls .sep { width: 1px; height: 16px; background: var(--border2); }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 8px 12px 8px;
    color: var(--dim); font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: .06em;
    border-bottom: 1px solid var(--border2);
  }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.018); }
  table.sticky thead th { position: sticky; top: 57px; background: var(--panel); z-index: 2; }

  /* ── Pills ── */
  .pill {
    display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: .02em; white-space: nowrap;
  }
  .pill.good  { background: var(--good-bg);  color: var(--good);  border: 1px solid rgba(34,197,94,.25); }
  .pill.warn  { background: var(--warn-bg);  color: var(--warn);  border: 1px solid rgba(245,158,11,.25); }
  .pill.bad   { background: var(--bad-bg);   color: var(--bad);   border: 1px solid rgba(244,63,94,.25); }
  .pill.muted { background: rgba(127,147,179,.1); color: var(--muted); border: 1px solid var(--border2); }
  .pill.accent { background: rgba(56,189,248,.12); color: var(--accent); border: 1px solid rgba(56,189,248,.3); }

  /* ── Frequency badge ── */
  .freq-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 32px; padding: 3px 10px;
    border-radius: 6px; font-size: 12px; font-weight: 700;
  }
  .freq-badge.high { background: rgba(244,63,94,.15); color: var(--bad); border: 1px solid rgba(244,63,94,.3); }
  .freq-badge.med  { background: rgba(245,158,11,.15); color: var(--warn); border: 1px solid rgba(245,158,11,.3); }
  .freq-badge.low  { background: rgba(56,189,248,.12); color: var(--accent); border: 1px solid rgba(56,189,248,.3); }

  /* ── Progress bar ── */
  .progress-wrap { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; min-width: 70px; }
  .progress-bar  { height: 100%; border-radius: 4px; }
  .progress-bar.bad  { background: var(--bad); }
  .progress-bar.warn { background: var(--warn); }
  .progress-bar.good { background: var(--good); }

  /* ── Rank number ── */
  .rank { display: inline-flex; align-items: center; justify-content: center;
          width: 22px; height: 22px; border-radius: 50%;
          font-size: 11px; font-weight: 700; background: var(--border2); color: var(--muted);
          flex-shrink: 0; }
  .rank.r1 { background: rgba(244,63,94,.2); color: var(--bad); }
  .rank.r2 { background: rgba(245,158,11,.2); color: var(--warn); }
  .rank.r3 { background: rgba(56,189,248,.15); color: var(--accent); }

  /* ── Streak / "inactive now" ── */
  .streak-pill {
    display: inline-block; padding: 1px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
    background: var(--bad-bg); color: var(--bad);
    border: 1px solid rgba(244,63,94,.3);
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .pulse { animation: pulse 1.8s ease-in-out infinite; }

  /* ── Buttons ── */
  button {
    background: var(--border2); border: 1px solid var(--border2);
    color: var(--muted); padding: 4px 10px;
    border-radius: 5px; cursor: pointer; font-size: 12px;
    transition: all .15s;
  }
  button:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  form.inline { display: inline; }

  /* ── Banner (poll status) ── */
  .banner {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 18px; border-radius: 10px; margin-bottom: 20px;
    border: 1px solid var(--border);
    background: var(--panel);
  }
  .banner-icon {
    font-size: 16px; font-weight: 800;
    width: 32px; height: 32px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
  }
  .banner-body { flex: 1; min-width: 0; }
  .banner-title { font-weight: 700; font-size: 13px; }
  .banner-text  { color: var(--muted); font-size: 12px; margin-top: 2px; word-break: break-word; }
  .banner-meta  { color: var(--dim);   font-size: 11px; margin-top: 5px; }
  .banner-ok    { border-color: rgba(34,197,94,.3);   }
  .banner-ok    .banner-icon { background: var(--good-bg);  color: var(--good); }
  .banner-wait  { border-color: var(--border2); }
  .banner-wait  .banner-icon { background: var(--border2); color: var(--muted); }
  .banner-stale { border-color: rgba(245,158,11,.35); }
  .banner-stale .banner-icon { background: var(--warn-bg); color: var(--warn); }
  .banner-error { border-color: rgba(244,63,94,.35);  }
  .banner-error .banner-icon { background: var(--bad-bg);  color: var(--bad); }

  /* ── Links ── */
  .link { color: var(--accent); text-decoration: none; font-weight: 500; }
  .link:hover { text-decoration: underline; }
  a.tab-pill { text-decoration: none; font-size: 11px; font-weight: 600; }

  /* ── Empty state ── */
  .empty { color: var(--muted); text-align: center; padding: 28px 12px; font-size: 13px; }
  .empty-ok { color: var(--good); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .empty-ok-wrap { padding: 14px 0 4px; }

  /* ── Name cell ── */
  .name-cell { display: flex; align-items: center; gap: 8px; }

  /* ── Login ── */
  .login-wrap { max-width: 360px; margin: 80px auto; }
  .login-wrap input { width: 100%; padding: 10px; border-radius: 6px;
                      border: 1px solid var(--border2); background: var(--panel);
                      color: var(--text); margin-bottom: 12px; font-size: 14px; }
  .login-wrap button { width: 100%; padding: 10px; font-size: 14px; }
  .err { color: var(--bad); font-size: 13px; margin-bottom: 12px; }

  /* ── Two-column layout ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
