<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}FindPresence{% endblock %}</title>
{% block head %}{% endblock %}
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel2: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
    --good: #22c55e; --warn: #f59e0b; --bad: #ef4444;
  }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, sans-serif;
         margin: 0; background: var(--bg); color: var(--text); }
  header { background: var(--panel); padding: 16px 24px; display: flex;
           align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; margin: 0; }
  header .meta { color: var(--muted); font-size: 13px; }
  header a { color: var(--accent); text-decoration: none; margin-left: 16px; }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
           gap: 12px; margin-bottom: 24px; }
  .card { background: var(--panel); border-radius: 8px; padding: 16px; }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase;
                 letter-spacing: 0.05em; }
  .card .value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .card.good .value { color: var(--good); }
  .card.warn .value { color: var(--warn); }
  .card.bad .value { color: var(--bad); }
  .panel { background: var(--panel); border-radius: 8px; padding: 16px;
           margin-bottom: 24px; }
  .panel h2 { font-size: 14px; margin: 0 0 12px; text-transform: uppercase;
              letter-spacing: 0.05em; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--panel2); }
  th { color: var(--muted); font-weight: 500; text-transform: uppercase;
       font-size: 11px; letter-spacing: 0.05em; }
  tr:last-child td { border-bottom: none; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px;
          font-size: 11px; font-weight: 500; }
  .pill.good { background: rgba(34,197,94,.15); color: var(--good); }
  .pill.warn { background: rgba(245,158,11,.15); color: var(--warn); }
  .pill.bad  { background: rgba(239,68,68,.15);  color: var(--bad); }
  .pill.muted { background: var(--panel2); color: var(--muted); }
  button { background: var(--panel2); border: none; color: var(--text);
           padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  button:hover { background: var(--accent); color: var(--bg); }
  form.inline { display: inline; }
  .login-wrap { max-width: 360px; margin: 80px auto; }
  .login-wrap input { width: 100%; padding: 10px; border-radius: 6px;
                      border: 1px solid var(--panel2); background: var(--panel);
                      color: var(--text); margin-bottom: 12px; }
  .login-wrap button { width: 100%; padding: 10px; }
  .err { color: var(--bad); font-size: 13px; margin-bottom: 12px; }

  .card .sublabel { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .banner { display: flex; gap: 14px; align-items: flex-start;
            padding: 14px 18px; border-radius: 8px; margin-bottom: 24px;
            border-left: 4px solid var(--panel2); background: var(--panel); }
  .banner-icon { font-size: 22px; font-weight: 700;
                 width: 28px; height: 28px; flex-shrink: 0;
                 display: flex; align-items: center; justify-content: center;
                 border-radius: 50%; }
  .banner-body { flex: 1; min-width: 0; }
  .banner-title { font-weight: 600; font-size: 14px; }
  .banner-text { color: var(--muted); font-size: 13px; margin-top: 2px;
                 word-break: break-word; }
  .banner-meta { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .banner-ok    { border-left-color: var(--good); }
  .banner-ok    .banner-icon { background: rgba(34,197,94,.15);  color: var(--good); }
  .banner-wait  { border-left-color: var(--muted); }
  .banner-wait  .banner-icon { background: var(--panel2); color: var(--muted); }
  .banner-stale { border-left-color: var(--warn); }
  .banner-stale .banner-icon { background: rgba(245,158,11,.15); color: var(--warn); }
  .banner-error { border-left-color: var(--bad); }
  .banner-error .banner-icon { background: rgba(239,68,68,.15); color: var(--bad); }

  .panel-head { display: flex; justify-content: space-between;
                align-items: center; gap: 12px; flex-wrap: wrap;
                margin-bottom: 12px; }
  .panel-controls { display: flex; gap: 10px; align-items: center;
                    flex-wrap: wrap; }
  .panel-controls input[type=search] {
    background: var(--bg); color: var(--text); border: 1px solid var(--panel2);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; min-width: 220px; }
  .panel-controls .check { color: var(--muted); font-size: 12px;
                           display: flex; align-items: center; gap: 6px; }
  .panel-controls .sep { width: 1px; height: 18px; background: var(--panel2); }
  .panel-controls a.pill { text-decoration: none; }

  table.sticky thead th { position: sticky; top: 0; background: var(--panel);
                          z-index: 1; }
  .empty { color: var(--muted); text-align: center; padding: 24px 12px;
           font-size: 13px; }
  .link { color: var(--accent); text-decoration: none; }
  .link:hover { text-decoration: underline; }
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
